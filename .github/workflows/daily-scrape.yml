name: Daily Opportunity Discovery

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC every day
  workflow_dispatch:        # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
      
      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          cd backend
          python -c "import asyncio; from app.pipeline.orchestrator import run_daily_pipeline; asyncio.run(run_daily_pipeline())"
      
      - name: Send status notification
        if: failure()
        run: echo "Pipeline failed — check logs"
